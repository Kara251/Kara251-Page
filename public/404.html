<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>404 | www.kara251.com</title>
    <meta name="theme-color" content="#000000">
    <script>
      (function () {
        var pathname = window.location.pathname;
        var redirectedPath = null;

        if (pathname === "/https" || pathname === "/http") {
          redirectedPath = "/";
        } else if (pathname.indexOf("/https/") === 0) {
          redirectedPath = pathname.slice(6);
        } else if (pathname.indexOf("/http/") === 0) {
          redirectedPath = pathname.slice(5);
        }

        if (redirectedPath !== null) {
          window.location.replace(redirectedPath + window.location.search + window.location.hash);
        }
      })();
    </script>
    <link rel="stylesheet" href="/site.css">
  </head>
  <body class="not-found-body">
    <main class="not-found-shell">
      <div class="rule-double"></div>
      <p class="not-found-code">404</p>
      <h1 class="not-found-title">This page is not here.</h1>
      <p class="not-found-copy">Return to the main index and choose another route.</p>
      <a class="not-found-link" href="/">Back to Home</a>
      <div class="rule-double"></div>
    </main>
  </body>
</html>
