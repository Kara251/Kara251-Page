    <div
      class="lang-gate"
      id="lang-gate"
      role="dialog"
      aria-modal="true"
      aria-labelledby="lang-gate-title"

      <div class="lang-gate-panel">
        <div class="rule-double"></div>
        <p class="lang-gate-kicker" id="lang-gate-kicker">LANGUAGE INDEX</p>
        <h2 class="lang-gate-title" id="lang-gate-title">先選擇語言</h2>

        </p>
        <div class="rule-double"></div>
      </div>

    <div class="language-control" id="language-control" hidden>

      <span class="frame-line frame-line-bottom"></span>
      <span class="frame-line frame-line-left"></span>

      <span class="sweep-word sweep-word-2">Claritas</span>
      <span class="sweep-word sweep-word-3">Amor</span>

      <div class="hero-rail hero-rail-left" aria-hidden="true">www.kara251.com</div>
      <div class="hero-rail hero-rail-right" aria-hidden="true">KARA251</div>

      <section class="hero-shell">
        <div class="hero-lead">
          <div class="hero-header">
            <span class="hero-kicker" id="hero-kicker">PERSONAL INDEX</span>
            <span class="hero-route" id="hero-route">www.kara251.com</span>

          <div class="friend-header">
            <h2 class="friend-title" id="friend-title">友情連結</h2>
          </div>
          <article class="friend-card friend-self-card" id="friend-self-card"></article>
          <div class="friend-grid" id="friend-grid" aria-label="友情連結"></div>
        </section>
      </section>
